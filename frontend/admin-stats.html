      <!-- Main Content -->

        <!-- Plugin Stats -->
        <div class="card" style="margin-bottom: 2rem;">
          <div class="card-header">
            <h2 class="card-title">插件统计</h2>
          </div>
          <div class="card-body">
            <div class="stats-grid" id="plugin-stats">
              <div class="stat-card">
                <div class="stat-info">
                  <p class="stat-label">总插件数</p>
                  <p class="stat-value" id="stat-total-plugins">0</p>
                </div>
                <div class="stat-icon info">
                  <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                  </svg>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-info">
                  <p class="stat-label">待审核</p>
                  <p class="stat-value" id="stat-pending-plugins">0</p>
                </div>
                <div class="stat-icon warning">
                  <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                  </svg>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-info">
                  <p class="stat-label">已通过</p>
                  <p class="stat-value" id="stat-approved-plugins">0</p>
                </div>
                <div class="stat-icon success">
                  <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                  </svg>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-info">
                  <p class="stat-label">已驳回</p>
                  <p class="stat-value" id="stat-rejected-plugins">0</p>
                </div>
                <div class="stat-icon error">
                  <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                  </svg>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-info">
                  <p class="stat-label">已下架</p>
                  <p class="stat-value" id="stat-removed-plugins">0</p>
                </div>
                <div class="stat-icon default">
                  <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/>
                  </svg>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-info">
                  <p class="stat-label">草稿</p>
                  <p class="stat-value" id="stat-draft-plugins">0</p>
                </div>
                <div class="stat-icon default">
                  <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>

                  <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>

              </div>
              <div class="stat-card">
                <div class="stat-info">
                  <p class="stat-label">已通过</p>
                  <p class="stat-value" id="stat-approved-reviews">0</p>
                </div>
                <div class="stat-icon success">
                  <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                  </svg>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-info">
                  <p class="stat-label">已驳回</p>
                  <p class="stat-value" id="stat-rejected-reviews">0</p>
                </div>
                <div class="stat-icon error">
                  <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <p>开源插件市场 - 基于 GitHub OAuth 的元数据插件平台</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    // 检查登录状态和管理员权限
    (async function checkAuth() {
      if (!auth.isAuthenticated()) {
        window.location.href = '/login.html?returnUrl=' + encodeURIComponent(window.location.pathname);
        return;
      }
      
      const user = auth.getUser();
      if (!user || user.role !== 'admin') {
        alert('您没有权限访问此页面');
        window.location.href = '/';
        return;
      }
      
      loadStats();
    })();

    // 加载统计数据
    async function loadStats() {
      try {
        const stats = await api.get('/admin/stats');
        
        // 插件统计
        if (stats.plugins) {
          const p = stats.plugins;
          const total = (p.draft || 0) + (p.pending || 0) + (p.approved || 0) + (p.rejected || 0) + (p.removed || 0);
          document.getElementById('stat-total-plugins').textContent = total;
          document.getElementById('stat-pending-plugins').textContent = p.pending || 0;
          document.getElementById('stat-approved-plugins').textContent = p.approved || 0;
          document.getElementById('stat-rejected-plugins').textContent = p.rejected || 0;
          document.getElementById('stat-removed-plugins').textContent = p.removed || 0;
          document.getElementById('stat-draft-plugins').textContent = p.draft || 0;
        }
        
        // 用户统计
        if (stats.users) {
          const u = stats.users;
          const total = (u.users || 0) + (u.developers || 0) + (u.reviewers || 0) + (u.admins || 0);
          document.getElementById('stat-total-users').textContent = total;
          document.getElementById('stat-developers').textContent = u.developers || 0;
          document.getElementById('stat-reviewers').textContent = u.reviewers || 0;
          document.getElementById('stat-admins').textContent = u.admins || 0;
          document.getElementById('stat-regular-users').textContent = u.users || 0;
        }
        
        // 审核统计
        if (stats.reviews) {
          const r = stats.reviews;
          document.getElementById('stat-total-reviews').textContent = r.total || 0;
          document.getElementById('stat-approved-reviews').textContent = r.approved || 0;
          document.getElementById('stat-rejected-reviews').textContent = r.rejected || 0;
        }
      } catch (error) {
        console.error('Failed to load stats:', error);
      }
    }
  </script>
