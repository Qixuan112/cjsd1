<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>插件商店 - 开源插件市场</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <a href="/" class="logo">开源插件市场</a>
        <nav class="nav-links">
          <a href="store.html" class="nav-link">浏览商店</a>
          <div class="user-container">
            <a href="login.html" class="btn btn-primary btn-sm">登录</a>
          </div>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="page-content">
      <div class="container">
        <!-- Page Header -->
        <div class="page-header">
          <h1 class="page-title">插件商店</h1>
          <p class="page-description">发现和安装优质的开源插件</p>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
          <div class="filter-row">
            <!-- Search -->
            <div style="flex: 1; position: relative;">
              <svg style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: var(--color-text-muted);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              <input type="text" id="search-input" class="form-input" placeholder="搜索插件..." style="padding-left: 2.5rem;">
            </div>

            <!-- Category Filter -->
            <div class="filter-group">
              <svg style="width: 20px; height: 20px; color: var(--color-text-muted);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
              </svg>
              <select id="category-select" class="form-select" style="width: auto;">
                <option value="all">全部分类</option>
                <option value="productivity">生产力</option>
                <option value="developer-tools">开发工具</option>
                <option value="design">设计</option>
                <option value="communication">通讯</option>
                <option value="utilities">实用工具</option>
              </select>
            </div>

            <!-- Sort -->
            <div class="filter-group">
              <span class="filter-label">排序:</span>
              <select id="sort-select" class="form-select" style="width: auto;">
                <option value="stars">Stars</option>
                <option value="updated">最近更新</option>
              </select>
            </div>
          </div>

          <!-- Category Tags -->
          <div class="category-tags" id="category-tags">
            <button class="category-tag active" data-category="all">全部</button>
            <button class="category-tag" data-category="productivity">生产力</button>
            <button class="category-tag" data-category="developer-tools">开发工具</button>
            <button class="category-tag" data-category="design">设计</button>
            <button class="category-tag" data-category="communication">通讯</button>
            <button class="category-tag" data-category="utilities">实用工具</button>
          </div>
        </div>

        <!-- Results Count -->
        <p style="font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 1rem;">
          找到 <span id="results-count">0</span> 个插件
        </p>

        <!-- Plugins Grid -->
        <div id="plugins-container" class="plugin-grid">
          <!-- Plugins will be loaded here -->
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <p>开源插件市场 - 基于 GitHub OAuth 的元数据插件平台</p>
          <p style="margin-top: 0.5rem;">本站不托管插件文件，请直接访问 GitHub 仓库获取</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    // 分类标签切换
    document.querySelectorAll('.category-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        document.getElementById('category-select').value = tag.dataset.category;
        loadPlugins();
      });
    });

    // 分类下拉框
    document.getElementById('category-select').addEventListener('change', (e) => {
      document.querySelectorAll('.category-tag').forEach(t => {
        t.classList.toggle('active', t.dataset.category === e.target.value);
      });
      loadPlugins();
    });

    // 排序
    document.getElementById('sort-select').addEventListener('change', loadPlugins);

    // 搜索（防抖）
    const debouncedSearch = utils.debounce(loadPlugins, 300);
    document.getElementById('search-input').addEventListener('input', debouncedSearch);

    // 加载插件列表
    async function loadPlugins() {
      const container = document.getElementById('plugins-container');
      utils.showLoading(container, '加载插件中...');

      try {
        const search = document.getElementById('search-input').value;
        const category = document.getElementById('category-select').value;
        const sortBy = document.getElementById('sort-select').value;

        // 构建查询参数
        const params = new URLSearchParams();
        if (search) params.append('search', search);
        if (category && category !== 'all') params.append('category', category);
        if (sortBy) params.append('sortBy', sortBy);

        const data = await api.get(`/plugins?${params.toString()}`);
        const plugins = data.items || [];

        document.getElementById('results-count').textContent = plugins.length;

        if (plugins.length === 0) {
          utils.showEmpty(container, '没有找到匹配的插件，请尝试其他搜索条件');
          return;
        }

        container.innerHTML = plugins.map(plugin => `
          <a href="plugin-detail.html?id=${plugin.id}" class="plugin-card">
            <div class="plugin-header">
              <img src="${plugin.author?.avatarUrl || 'https://avatars.githubusercontent.com/u/0?v=4'}" alt="${plugin.author?.username || 'unknown'}" class="plugin-avatar">
              <div class="plugin-info">
                <h3 class="plugin-name">${plugin.name}</h3>
                <p class="plugin-version">v${plugin.version}</p>
              </div>
            </div>
            <p class="plugin-description">${plugin.description || '暂无描述'}</p>
            <div class="plugin-stats">
              <div class="plugin-stat">
                <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                </svg>
                <span>${plugin.githubData?.stars || 0}</span>
              </div>
              <div class="plugin-stat">
                <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                </svg>
                <span>${plugin.githubData?.forks || 0}</span>
              </div>
              <div class="plugin-stat">
                <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span>${utils.formatDate(plugin.githubData?.lastUpdated)}</span>
              </div>
            </div>
            <div class="plugin-tags">
              ${(plugin.categories || []).map(cat => `
                <span class="badge badge-default">${utils.getCategoryName(cat)}</span>
              `).join('')}
            </div>
          </a>
        `).join('');
      } catch (error) {
        utils.showError(container, '加载插件失败，请稍后重试', 'loadPlugins()');
      }
    }

    // 初始加载
    loadPlugins();
  </script>
</body>
</html>
