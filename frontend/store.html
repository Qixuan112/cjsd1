<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title="store.title">KiraAI 插件商店</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <a href="/" class="logo" data-i18n="site.name">KiraAI 插件商店</a>
        <nav class="nav-links">
          <a href="store.html" class="nav-link" data-i18n="nav.browse">浏览商店</a>
          <div class="user-container">
            <a href="login.html" class="btn btn-primary btn-sm" data-i18n="nav.login">登录</a>
          </div>
          <button class="lang-switch" onclick="i18n.toggleLanguage()" title="Switch Language">
            <span class="lang-current">中/EN</span>
          </button>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main class="page-content">
      <div class="container">
        <!-- Page Header -->
        <div class="page-header">
          <h1 class="page-title" data-i18n="store.title">KiraAI 插件商店</h1>
          <p class="page-description" data-i18n="site.tagline">发现和安装优质的开源插件</p>
        </div>

        <!-- Search Bar -->
        <div class="filter-bar" style="margin-bottom: 1.5rem;">
          <div class="filter-row">
            <!-- Search -->
            <div style="flex: 1; position: relative;">
              <svg style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: var(--color-text-muted);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              <input type="text" id="search-input" class="form-input" data-i18n-placeholder="store.searchPlaceholder" placeholder="搜索插件..." style="padding-left: 2.5rem;">
            </div>

            <!-- Sort -->
            <div class="filter-group">
              <span class="filter-label" data-i18n="store.sortBy">排序:</span>
              <select id="sort-select" class="form-select" style="width: auto;">
                <option value="stars" data-i18n="store.sort.stars">最多 Stars</option>
                <option value="updated" data-i18n="store.sort.updated">最近更新</option>
                <option value="name" data-i18n="store.sort.name">名称</option>
              </select>
            </div>
          </div>
        </div>

        <!-- 标签式分类导航 -->
        <nav class="category-nav" id="category-nav" style="margin-bottom: 1.5rem;">
          <span class="category-tag-item all active" data-category="all" data-i18n="store.category.all">
            全部
          </span>
          <span class="category-tag-item utility" data-category="实用" data-i18n="store.category.utility">
            实用
          </span>
          <span class="category-tag-item efficiency" data-category="效率" data-i18n="store.category.efficiency">
            效率
          </span>
          <span class="category-tag-item entertainment" data-category="娱乐" data-i18n="store.category.entertainment">
            娱乐
          </span>
          <span class="category-tag-item developer" data-category="开发者" data-i18n="store.category.developer">
            开发者
          </span>
          <span class="category-tag-item ai" data-category="AI" data-i18n="store.category.ai">
            AI
          </span>
        </nav>

        <!-- Results Count -->
        <div class="plugins-header" style="margin-bottom: 1rem;">
          <h2 class="plugins-title">
            <span data-i18n="store.results.count" data-i18n-params="{count:0}">共 0 个插件</span>
          </h2>
        </div>

        <!-- Plugins Grid -->
        <div id="plugins-container" class="plugin-grid">
          <!-- Plugins will be loaded here -->
        </div>

        <!-- Load More -->
        <div class="text-center" style="margin-top: 2rem;">
          <button id="load-more-btn" class="btn btn-outline" style="display: none;" data-i18n="store.loadMore">加载更多</button>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-grid">
            <div class="footer-section">
              <h3 class="footer-section-title" data-i18n="footer.thanks">特别鸣谢</h3>
              <a href="https://github.com/" target="_blank" class="footer-link" data-i18n="footer.github">GitHub</a>
              <a href="contributors.html" class="footer-link" data-i18n="footer.contributors">开源贡献者</a>
              <a href="#" class="footer-link" data-i18n="footer.community">社区支持者</a>
            </div>
            <div class="footer-section">
              <h3 class="footer-section-title" data-i18n="footer.docs">相关说明</h3>
              <a href="terms.html" class="footer-link" data-i18n="footer.terms">服务条款</a>
              <a href="privacy.html" class="footer-link" data-i18n="footer.privacy">隐私政策</a>
            </div>
          </div>
          <div class="footer-bottom">
            <p data-i18n="site.name">KiraAI 插件商店 - 元数据插件平台</p>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
  <script>
    let currentPage = 1;
    let currentCategory = 'all';
    let currentSearch = '';
    let currentSort = 'stars';
    let isLoading = false;
    let hasMore = true;

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      setupCategoryFilter();
      setupSearch();
      setupSort();
      loadPlugins();
    });

    // 设置分类筛选
    function setupCategoryFilter() {
      const categoryTags = document.querySelectorAll('.category-tag-item');
      categoryTags.forEach(tag => {
        tag.addEventListener('click', () => {
          categoryTags.forEach(t => t.classList.remove('active'));
          tag.classList.add('active');
          
          currentCategory = tag.dataset.category;
          currentPage = 1;
          hasMore = true;
          loadPlugins(true);
        });
      });
    }

    // 设置搜索
    function setupSearch() {
      const debouncedSearch = utils.debounce((value) => {
        currentSearch = value;
        currentPage = 1;
        hasMore = true;
        loadPlugins(true);
      }, 300);

      document.getElementById('search-input').addEventListener('input', (e) => {
        debouncedSearch(e.target.value);
      });
    }

    // 设置排序
    function setupSort() {
      document.getElementById('sort-select').addEventListener('change', (e) => {
        currentSort = e.target.value;
        currentPage = 1;
        hasMore = true;
        loadPlugins(true);
      });
    }

    // 加载插件列表
    async function loadPlugins(reset = false) {
      if (isLoading || !hasMore) return;
      
      const t = window.i18n ? window.i18n.t.bind(window.i18n) : (k) => k;
      isLoading = true;
      const container = document.getElementById('plugins-container');
      
      if (reset) {
        utils.showLoading(container, t('msg.loadingPlugins'));
      }

      try {
        // 构建查询参数
        const params = new URLSearchParams();
        params.append('limit', '12');
        params.append('page', currentPage.toString());
        if (currentSearch) params.append('search', currentSearch);
        if (currentCategory !== 'all') params.append('category', currentCategory);
        if (currentSort) params.append('sortBy', currentSort);

        const data = await api.get(`/plugins?${params.toString()}`);
        const plugins = data.items || [];
        const total = data.total || 0;

        // 更新计数
        const countEl = document.querySelector('.plugins-title span');
        countEl.setAttribute('data-i18n-params', JSON.stringify({count: total}));
        countEl.textContent = t('store.results.count', {count: total});

        if (plugins.length === 0 && reset) {
          utils.showEmpty(container, t('store.empty'));
          document.getElementById('load-more-btn').style.display = 'none';
          return;
        }

        // 渲染插件
        const pluginsHtml = plugins.map(plugin => `
          <div class="plugin-card">
            <div class="plugin-header">
              <a href="author.html?name=${encodeURIComponent(plugin.author)}" class="plugin-author-link" onclick="event.stopPropagation();">
                <img src="${plugin.github_data?.owner?.avatar_url || `https://avatars.githubusercontent.com/u/${plugin.author_github_id || 0}?v=4`}" 
                     alt="${plugin.author}" class="plugin-avatar"
                     onerror="this.onerror=null;this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(plugin.author || "?")}&background=e5e7eb&color=6b7280&size=40'">
              </a>
              <div class="plugin-info">
                <div class="plugin-name-wrapper">
                  <a href="author.html?name=${encodeURIComponent(plugin.author)}" class="plugin-author" onclick="event.stopPropagation();">${plugin.author}</a>
                  <span class="plugin-author-separator">/</span>
                  <a href="plugin-detail.html?id=${plugin.id}" class="plugin-name">${plugin.name}</a>
                  ${plugin.version ? `<span class="plugin-update-badge">+1</span>` : ''}
                </div>
              </div>
            </div>
            <p class="plugin-description">${plugin.description || t('msg.empty')}</p>
            <div class="plugin-stats">
              <span class="plugin-stat">
                <svg style="width: 16px; height: 16px;" fill="currentColor" viewBox="0 0 20 20">
                <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
              </svg>
                ${plugin.github_data?.stars || 0}
              </span>
              <span class="plugin-stat">
                <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                </svg>
                ${plugin.github_data?.forks || 0}
              </span>
            </div>
            <div class="plugin-tags">
              <span class="badge badge-default">${plugin.category || t('store.category.all')}</span>
            </div>
            <a href="plugin-detail.html?id=${plugin.id}" class="plugin-card-link"></a>
          </div>
        `).join('');

        if (reset) {
          container.innerHTML = pluginsHtml;
        } else {
          container.insertAdjacentHTML('beforeend', pluginsHtml);
        }

        // 检查是否还有更多
        hasMore = plugins.length === 12;
        document.getElementById('load-more-btn').style.display = hasMore ? 'inline-flex' : 'none';

        if (hasMore) {
          currentPage++;
        }
      } catch (error) {
        console.error('加载插件失败:', error);
        if (reset) {
          utils.showError(container, t('msg.error.load'), 'loadPlugins()');
        }
      } finally {
        isLoading = false;
      }
    }

    // 加载更多按钮
    document.getElementById('load-more-btn').addEventListener('click', () => {
      loadPlugins(false);
    });
  </script>
</body>
</html>
