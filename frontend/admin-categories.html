                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <span data-i18n="admin.sidebar.user_management">用户管理</span>
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="admin-plugins.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                </svg>
                <span data-i18n="admin.sidebar.plugin_management">插件管理</span>

            <li class="sidebar-nav-item">
              <a href="admin-reviewers.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span data-i18n="admin.sidebar.reviewer_management">审批者管理</span>
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="admin-categories.html" class="sidebar-nav-link active">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                </svg>
                <span data-i18n="admin.sidebar.category_management">分类管理</span>
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="admin-stats.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                <span data-i18n="admin.sidebar.statistics">数据统计</span>
              </a>
            </li>
          </ul>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
          <h1 class="page-title" data-i18n="admin.categories.page_title">分类管理</h1>
          <p class="page-description" data-i18n="admin.categories.page_description">管理插件分类</p>
        </div>

        <!-- Category List -->
        <div class="card">
          <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
            <h2 class="card-title" data-i18n="admin.categories.list_title">分类列表</h2>
            <button class="btn btn-primary" onclick="openCreateModal()">
              <svg style="width: 16px; height: 16px; margin-right: 4px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              <span data-i18n="admin.categories.new_category">新建分类</span>
            </button>
          </div>
          <div class="card-body">
            <div id="categories-container">
              <!-- Categories will be loaded here -->
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-grid">
            <div class="footer-section">
              <h3 class="footer-section-title" data-i18n="footer.acknowledgments">特别鸣谢</h3>
              <a href="https://github.com/" target="_blank" class="footer-link">GitHub</a>
              <a href="contributors.html" class="footer-link" data-i18n="footer.contributors">开源贡献者</a>
              <a href="#" class="footer-link" data-i18n="footer.supporters">社区支持者</a>
            </div>
            <div class="footer-section">
              <h3 class="footer-section-title" data-i18n="footer.terms">相关说明</h3>
              <a href="#" class="footer-link" data-i18n="footer.terms_of_use">使用条款</a>
              <a href="#" class="footer-link" data-i18n="footer.privacy_policy">隐私政策</a>
              <a href="#" class="footer-link" data-i18n="footer.disclaimer">免责声明</a>
            </div>
            <div class="footer-section">
              <h3 class="footer-section-title" data-i18n="footer.contact">联系我们</h3>
              <a href="mailto:contact@example.com" class="footer-link" data-i18n="footer.email">电子邮箱</a>
              <a href="#" class="footer-link" data-i18n="footer.feedback">问题反馈</a>
              <a href="#" class="footer-link" data-i18n="footer.join_us">加入我们</a>
            </div>
          </div>
          <div class="footer-bottom">
            <p data-i18n="footer.copyright">开源插件市场 - 元数据插件平台</p>
            <p style="margin-top: 0.5rem;" data-i18n="footer.notice">本站不托管插件文件，请直接访问 GitHub 仓库获取</p>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <!-- Create Category Modal -->
  <div id="create-modal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="admin.categories.create_title">新建分类</h3>
        <button class="modal-close" onclick="closeCreateModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label"><span data-i18n="admin.categories.category_name">分类名称</span> <span class="text-error">*</span></label>
          <input type="text" class="form-input" id="create-name" data-i18n-placeholder="admin.categories.name_placeholder">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="admin.categories.category_description">分类描述</label>
          <textarea class="form-textarea" id="create-description" rows="3" data-i18n-placeholder="admin.categories.description_placeholder"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeCreateModal()" data-i18n="common.cancel">取消</button>
        <button class="btn btn-primary" onclick="createCategory()" data-i18n="common.create">创建</button>
      </div>
    </div>
  </div>

  <!-- Edit Category Modal -->
  <div id="edit-modal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="admin.categories.edit_title">编辑分类</h3>
        <button class="modal-close" onclick="closeEditModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label class="form-label"><span data-i18n="admin.categories.category_name">分类名称</span> <span class="text-error">*</span></label>
          <input type="text" class="form-input" id="edit-name" data-i18n-placeholder="admin.categories.name_placeholder">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="admin.categories.category_description">分类描述</label>
          <textarea class="form-textarea" id="edit-description" rows="3" data-i18n-placeholder="admin.categories.description_placeholder"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeEditModal()" data-i18n="common.cancel">取消</button>
        <button class="btn btn-primary" onclick="updateCategory()" data-i18n="common.save">保存</button>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
  <script>
    // 更新语言切换按钮状态
    document.getElementById('current-lang').textContent = i18n.getCurrentLanguage().toUpperCase();

    // 检查登录状态和管理员权限
    (async function checkAuth() {
      if (!auth.isAuthenticated()) {
        window.location.href = '/login.html?returnUrl=' + encodeURIComponent(window.location.pathname);
        return;
      }
      
      const user = auth.getUser();
      if (!user || user.role !== 'admin') {
        alert(i18n.t('admin.no_permission') || '您没有权限访问此页面');
        window.location.href = '/';
        return;
      }
      
      loadCategories();
    })();

    // 加载分类列表
    async function loadCategories() {
      const container = document.getElementById('categories-container');
      
      try {
        utils.showLoading(container, i18n.t('common.loading') || '加载中...');
        
        const categories = await api.get('/admin/categories');

        if (categories.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
              </svg>
              <h3 class="empty-title">${i18n.t('admin.categories.empty_title') || '暂无分类'}</h3>
              <p class="empty-description">${i18n.t('admin.categories.empty_description') || '还没有创建任何分类'}</p>
              <button class="btn btn-primary" onclick="openCreateModal()">${i18n.t('admin.categories.create_category') || '创建分类'}</button>
            </div>
          `;
          return;
        }

        container.innerHTML = `
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th data-i18n="admin.categories.category_name">分类名称</th>
                  <th data-i18n="admin.categories.description">描述</th>
                  <th data-i18n="admin.categories.plugin_count">插件数量</th>
                  <th data-i18n="common.actions">操作</th>
                </tr>
              </thead>
              <tbody>
                ${categories.map(category => `
                  <tr>
                    <td>${category.id}</td>
                    <td><strong>${category.name}</strong></td>
                    <td>${category.description || '-'}</td>
                    <td>
                      <span class="badge badge-info">${category.plugin_count || 0}</span>
                    </td>
                    <td>
                      <div class="flex gap-1">
                        <button class="btn btn-ghost btn-sm" onclick="openEditModal(${category.id}, '${category.name}', '${category.description || ''}')">${i18n.t('common.edit') || '编辑'}</button>
                        <button class="btn btn-error btn-sm" onclick="deleteCategory(${category.id}, '${category.name}')">${i18n.t('common.delete') || '删除'}</button>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        utils.showError(container, i18n.t('common.load_failed') || '加载失败，请重试', 'loadCategories()');
      }
    }

    // 打开创建模态框
    function openCreateModal() {
      document.getElementById('create-name').value = '';
      document.getElementById('create-description').value = '';
      document.getElementById('create-modal').style.display = 'flex';
    }

    // 关闭创建模态框
    function closeCreateModal() {
      document.getElementById('create-modal').style.display = 'none';
    }

    // 创建分类
    async function createCategory() {
      const name = document.getElementById('create-name').value.trim();
      const description = document.getElementById('create-description').value.trim();

      if (!name) {
        alert(i18n.t('admin.categories.name_required') || '请输入分类名称');
        return;
      }

      try {
        await api.post('/admin/categories', { name, description });
        closeCreateModal();
        alert(i18n.t('admin.categories.create_success') || '分类创建成功！');
        loadCategories();
      } catch (error) {
        alert((i18n.t('admin.categories.create_failed') || '创建失败：') + error.message);
      }
    }

    // 打开编辑模态框
    function openEditModal(id, name, description) {
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-name').value = name;
      document.getElementById('edit-description').value = description;
      document.getElementById('edit-modal').style.display = 'flex';
    }

    // 关闭编辑模态框
    function closeEditModal() {
      document.getElementById('edit-modal').style.display = 'none';
    }

    // 更新分类
    async function updateCategory() {
      const id = document.getElementById('edit-id').value;
      const name = document.getElementById('edit-name').value.trim();
      const description = document.getElementById('edit-description').value.trim();

      if (!name) {
        alert(i18n.t('admin.categories.name_required') || '请输入分类名称');
        return;
      }

      try {
        await api.put(`/admin/categories/${id}`, { name, description });
        closeEditModal();
        alert(i18n.t('admin.categories.update_success') || '分类更新成功！');
        loadCategories();
      } catch (error) {
        alert((i18n.t('admin.categories.update_failed') || '更新失败：') + error.message);
      }
    }

    // 删除分类
    async function deleteCategory(id, name) {
      if (!confirm(`${i18n.t('admin.categories.delete_confirm') || '确定要删除分类'} "${name}" ${i18n.t('admin.categories.delete_confirm_suffix') || '吗？\\n注意：如果该分类下有关联的插件，可能无法删除。'}`)) {
        return;
      }

      try {
        await api.delete(`/admin/categories/${id}`);
        alert(i18n.t('admin.categories.delete_success') || '分类删除成功！');
        loadCategories();
      } catch (error) {
        if (error.message && error.message.includes('400')) {
          alert(i18n.t('admin.categories.delete_has_plugins') || '该分类下有关联的插件，无法删除。请先移除相关插件后再试。');
        } else {
          alert((i18n.t('admin.categories.delete_failed') || '删除失败：') + error.message);
        }
      }
    }

    // 点击模态框外部关闭
    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('modal')) {
        e.target.style.display = 'none';
      }
    });
  </script>
</body>
</html>
