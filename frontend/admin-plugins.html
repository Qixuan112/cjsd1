<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>插件管理 - 开源插件市场</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <a href="/" class="logo">开源插件市场</a>
        <nav class="nav-links">
          <a href="store.html" class="nav-link">浏览商店</a>
          <div class="user-container"></div>
        </nav>
      </div>
    </header>

    <!-- Layout with Sidebar -->
    <div class="layout-with-sidebar">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-section-title">管理中心</div>
          <ul class="sidebar-nav">
            <li class="sidebar-nav-item">
              <a href="admin.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                </svg>
                仪表盘
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="admin-users.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                用户管理
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="admin-plugins.html" class="sidebar-nav-link active">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                插件管理
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="admin-reviewers.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                审批者管理
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="admin-stats.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                数据统计
              </a>
            </li>
          </ul>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
          <h1 class="page-title">插件管理</h1>
          <p class="page-description">管理平台所有插件</p>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid" style="margin-bottom: 2rem;">
          <div class="stat-card">
            <div class="stat-value" id="total-count">-</div>
            <div class="stat-label">总插件数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="pending-count">-</div>
            <div class="stat-label">待审核</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="approved-count">-</div>
            <div class="stat-label">已通过</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="rejected-count">-</div>
            <div class="stat-label">已驳回</div>
          </div>
        </div>

        <!-- Filter Tabs -->
        <div class="tabs" style="margin-bottom: 1.5rem;">
          <button class="tab-btn active" onclick="filterPlugins('all')" id="tab-all">全部</button>
          <button class="tab-btn" onclick="filterPlugins('pending')" id="tab-pending">待审核</button>
          <button class="tab-btn" onclick="filterPlugins('approved')" id="tab-approved">已通过</button>
          <button class="tab-btn" onclick="filterPlugins('rejected')" id="tab-rejected">已驳回</button>
        </div>

        <!-- Plugin List -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">插件列表</h2>
          </div>
          <div class="card-body">
            <div id="plugins-container">
              <!-- Plugins will be loaded here -->
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <p>开源插件市场 - 基于 GitHub OAuth 的元数据插件平台</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    // 检查登录状态和管理员权限
    (async function checkAuth() {
      if (!auth.isAuthenticated()) {
        window.location.href = '/login.html?returnUrl=' + encodeURIComponent(window.location.pathname);
        return;
      }
      
      const user = auth.getUser();
      if (!user || user.role !== 'admin') {
        alert('您没有权限访问此页面');
        window.location.href = '/';
        return;
      }
      
      loadPlugins();
    })();

    let allPlugins = [];
    let currentFilter = 'all';

    // 加载插件列表
    async function loadPlugins() {
      const container = document.getElementById('plugins-container');
      
      try {
        utils.showLoading(container, '加载中...');
        
        const data = await api.get('/admin/plugins');
        allPlugins = data.items || [];

        // 更新统计
        document.getElementById('total-count').textContent = allPlugins.length;
        document.getElementById('pending-count').textContent = allPlugins.filter(p => p.status === 'pending').length;
        document.getElementById('approved-count').textContent = allPlugins.filter(p => p.status === 'approved').length;
        document.getElementById('rejected-count').textContent = allPlugins.filter(p => p.status === 'rejected').length;

        renderPlugins();
      } catch (error) {
        utils.showError(container, '加载失败，请重试', 'loadPlugins()');
      }
    }

    // 过滤插件
    function filterPlugins(status) {
      currentFilter = status;
      
      // 更新标签状态
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('tab-' + status).classList.add('active');
      
      renderPlugins();
    }

    // 渲染插件列表
    function renderPlugins() {
      const container = document.getElementById('plugins-container');
      
      const plugins = currentFilter === 'all' 
        ? allPlugins 
        : allPlugins.filter(p => p.status === currentFilter);

      if (plugins.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
            <h3 class="empty-title">暂无插件</h3>
            <p class="empty-description">该状态下没有插件</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>插件名称</th>
                <th>作者</th>
                <th>分类</th>
                <th>状态</th>
                <th>提交时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${plugins.map(plugin => `
                <tr>
                  <td>
                    <div class="flex items-center gap-2">
                      <img src="${plugin.github_data?.owner?.avatar_url || 'https://avatars.githubusercontent.com/u/0?v=4'}" alt="${plugin.author}" class="w-6 h-6 rounded-full">
                      <span>${plugin.name}</span>
                    </div>
                  </td>
                  <td>${plugin.author}</td>
                  <td>${plugin.category || '-'}</td>
                  <td>
                    <span class="badge badge-${getStatusClass(plugin.status)}">${getStatusLabel(plugin.status)}</span>
                  </td>
                  <td>${utils.formatDate(plugin.created_at)}</td>
                  <td>
                    <a href="${plugin.repo_url}" target="_blank" class="btn btn-ghost btn-sm">查看仓库</a>
                    ${plugin.status === 'approved' ? `
                      <button class="btn btn-error btn-sm" onclick="banPlugin(${plugin.id}, '${plugin.name}')">下架</button>
                    ` : ''}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function getStatusClass(status) {
      const classes = {
        'pending': 'warning',
        'approved': 'success',
        'rejected': 'error',
        'removed': 'default'
      };
      return classes[status] || 'default';
    }

    function getStatusLabel(status) {
      const labels = {
        'pending': '待审核',
        'approved': '已通过',
        'rejected': '已驳回',
        'removed': '已下架'
      };
      return labels[status] || status;
    }

    // 下架插件
    async function banPlugin(pluginId, pluginName) {
      if (!confirm(`确定要下架插件 "${pluginName}" 吗？\n下架后插件将不再在商店中显示。`)) {
        return;
      }

      try {
        await api.post(`/admin/plugins/${pluginId}/ban`, {});
        alert('插件已下架！');
        loadPlugins(); // 刷新列表
      } catch (error) {
        alert('操作失败：' + error.message);
      }
    }
  </script>
</body>
</html>
