                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">

              <a href="admin-categories.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                </svg>

              <a href="admin-stats.html" class="sidebar-nav-link">

                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
          <h1 class="page-title" data-i18n="admin.reviewers.page_title">审批者管理</h1>
          <p class="page-description" data-i18n="admin.reviewers.page_description">管理插件审批人员</p>
        </div>

        <!-- Reviewer List -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title" data-i18n="admin.reviewers.list_title">审批者列表</h2>
            <button class="btn btn-primary" onclick="addReviewer()" data-i18n="admin.reviewers.add_reviewer">添加审批者</button>
          </div>
          <div class="card-body">
            <div id="reviewers-container">
              <!-- Reviewers will be loaded here -->
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">

              <a href="#" class="footer-link" data-i18n="footer.supporters">社区支持者</a>
            </div>

              <h3 class="footer-section-title" data-i18n="footer.terms">相关说明</h3>

            </div>
            <div class="footer-section">
              <h3 class="footer-section-title" data-i18n="footer.contact">联系我们</h3>
              <a href="mailto:contact@example.com" class="footer-link" data-i18n="footer.email">电子邮箱</a>
              <a href="#" class="footer-link" data-i18n="footer.feedback">问题反馈</a>
              <a href="#" class="footer-link" data-i18n="footer.join_us">加入我们</a>
            </div>
          </div>
          <div class="footer-bottom">
            <p data-i18n="footer.copyright">开源插件市场 - 元数据插件平台</p>
            <p style="margin-top: 0.5rem;" data-i18n="footer.notice">本站不托管插件文件，请直接访问 GitHub 仓库获取</p>
          </div>
        </div>
      </div>
    </footer>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
  <script>
    // 更新语言切换按钮状态
    document.getElementById('current-lang').textContent = i18n.getCurrentLanguage().toUpperCase();

    // 检查登录状态和管理员权限
    (async function checkAuth() {
      if (!auth.isAuthenticated()) {
        window.location.href = '/login.html?returnUrl=' + encodeURIComponent(window.location.pathname);
        return;
      }
      
      // 检查是否是管理员或审批者（admin 继承 reviewer 权限）
      const user = auth.getUser();
      if (!user || (user.role !== 'admin' && user.role !== 'reviewer')) {
        alert(i18n.t('admin.no_permission') || '您没有权限访问此页面');
        window.location.href = '/';
        return;
      }
      
      // 加载审批者列表
      loadReviewers();
    })();

    // 加载审批者列表
    async function loadReviewers() {
      const container = document.getElementById('reviewers-container');
      
      try {
        utils.showLoading(container, i18n.t('common.loading') || '加载中...');
        
        // 从用户列表中筛选出审批者
        const data = await api.get('/admin/users');
        const users = data.items || [];
        const reviewers = users.filter(u => u.role === 'reviewer');

        if (reviewers.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <h3 class="empty-title">${i18n.t('admin.reviewers.empty_title') || '暂无审批者'}</h3>
              <p class="empty-description">${i18n.t('admin.reviewers.empty_description') || '还没有设置审批人员'}</p>
            </div>
          `;
          return;
        }

        container.innerHTML = `
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th data-i18n="admin.users.username">用户名</th>
                  <th data-i18n="admin.users.email">邮箱</th>
                  <th data-i18n="admin.users.register_time">注册时间</th>
                  <th data-i18n="common.actions">操作</th>
                </tr>
              </thead>
              <tbody>
                ${reviewers.map(reviewer => `
                  <tr>
                    <td>${reviewer.id}</td>
                    <td>
                      <div class="flex items-center gap-2">
                        <img src="${reviewer.avatar || 'https://avatars.githubusercontent.com/u/0?v=4'}" alt="${reviewer.username}" class="w-6 h-6 rounded-full">
                        <span>${reviewer.username}</span>
                      </div>
                    </td>
                    <td>${reviewer.email || '-'}</td>
                    <td>${utils.formatDate(reviewer.createdAt)}</td>
                    <td>
                      <button class="btn btn-ghost btn-sm" onclick="removeReviewer(${reviewer.id})">${i18n.t('admin.reviewers.remove') || '移除'}</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        utils.showError(container, i18n.t('common.load_failed') || '加载失败，请重试', 'loadReviewers()');
      }
    }

    // 添加审批者 - 显示选择用户的模态框
    async function addReviewer() {
      try {
        // 获取所有非审批者、非管理员的用户
        const data = await api.get('/admin/users');
        const users = data.items || [];
        const eligibleUsers = users.filter(u => u.role === 'user');

        if (eligibleUsers.length === 0) {
          alert(i18n.t('admin.reviewers.no_eligible_users') || '没有可添加的用户（所有用户已是审批者或管理员）');
          return;
        }

        // 创建模态框
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.id = 'add-reviewer-modal';
        modal.innerHTML = `
          <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
              <h3 class="modal-title">${i18n.t('admin.reviewers.add_title') || '添加审批者'}</h3>
              <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
              <p style="margin-bottom: 1rem; color: var(--text-secondary);">${i18n.t('admin.reviewers.select_user') || '选择要设为审批者的用户：'}</p>
              <div class="user-select-list" style="max-height: 300px; overflow-y: auto;">
                ${eligibleUsers.map(user => `
                  <div class="user-select-item" style="display: flex; align-items: center; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 0.5rem; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s;" onclick="selectUserForReviewer(${user.id}, '${user.username}', this)">
                    <img src="${user.avatar || 'https://avatars.githubusercontent.com/u/0?v=4'}" alt="${user.username}" style="width: 32px; height: 32px; border-radius: 50%; margin-right: 0.75rem;">
                    <div style="flex: 1;">
                      <div style="font-weight: 500;">${user.username}</div>
                      <div style="font-size: 0.75rem; color: var(--text-secondary);">${user.email || (i18n.t('admin.reviewers.no_email') || '无邮箱')}</div>
                    </div>
                    <input type="radio" name="selected-user" value="${user.id}" style="margin-left: 0.5rem;">
                  </div>
                `).join('')}
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-ghost" onclick="closeModal()">${i18n.t('common.cancel') || '取消'}</button>
              <button class="btn btn-primary" onclick="confirmAddReviewer()" id="confirm-add-btn" disabled>${i18n.t('admin.reviewers.confirm_add') || '确认添加'}</button>
            </div>
          </div>
        `;
        document.body.appendChild(modal);

        // 添加选中样式
        const style = document.createElement('style');
        style.textContent = `
          .user-select-item:hover { background-color: var(--bg-secondary); }
          .user-select-item.selected { border-color: var(--primary); background-color: rgba(59, 130, 246, 0.1); }
        `;
        modal.appendChild(style);
      } catch (error) {
        alert((i18n.t('admin.reviewers.load_failed') || '加载用户列表失败：') + error.message);
      }
    }

    // 选择用户
    let selectedUserId = null;
    function selectUserForReviewer(userId, username, element) {
      selectedUserId = userId;
      
      // 移除其他选中状态
      document.querySelectorAll('.user-select-item').forEach(item => {
        item.classList.remove('selected');
        item.querySelector('input[type="radio"]').checked = false;
      });
      
      // 添加选中状态
      element.classList.add('selected');
      element.querySelector('input[type="radio"]').checked = true;
      
      // 启用确认按钮
      document.getElementById('confirm-add-btn').disabled = false;
    }

    // 确认添加审批者
    async function confirmAddReviewer() {
      if (!selectedUserId) {
        alert(i18n.t('admin.reviewers.select_first') || '请先选择一个用户');
        return;
      }

      try {
        await api.put(`/admin/users/${selectedUserId}/role`, { role: 'reviewer' });
        closeModal();
        alert(i18n.t('admin.reviewers.add_success') || '审批者添加成功！');
        loadReviewers(); // 刷新列表
      } catch (error) {
        alert((i18n.t('admin.reviewers.add_failed') || '添加失败：') + error.message);
      }
    }

    // 移除审批者
    async function removeReviewer(userId) {
      if (!confirm(i18n.t('admin.reviewers.remove_confirm') || '确定要将此用户从审批者列表中移除吗？\\n移除后该用户将恢复为普通用户角色。')) {
        return;
      }

      try {
        await api.put(`/admin/users/${userId}/role`, { role: 'user' });
        alert(i18n.t('admin.reviewers.remove_success') || '审批者已移除！');
        loadReviewers(); // 刷新列表
      } catch (error) {
        alert((i18n.t('admin.reviewers.remove_failed') || '移除失败：') + error.message);
      }
    }

    // 关闭模态框
    function closeModal() {
      const modal = document.getElementById('add-reviewer-modal');
      if (modal) {
        modal.remove();
      }
      selectedUserId = null;
    }
  </script>
</body>
