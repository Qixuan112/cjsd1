<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title="myPlugins.title">我的插件</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <a href="/" class="logo" data-i18n="site.name">KiraAI 插件商店</a>
        <nav class="nav-links">
          <a href="store.html" class="nav-link" data-i18n="nav.browse">浏览商店</a>
          <div class="user-container"></div>
          <button class="lang-switch" onclick="i18n.toggleLanguage()" title="Switch Language">
            <span class="lang-current">中/EN</span>
          </button>
        </nav>
      </div>
    </header>

    <!-- Layout with Sidebar -->
    <div class="layout-with-sidebar">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-section-title" data-i18n="sidebar.devCenter">开发者中心</div>
          <ul class="sidebar-nav">
            <li class="sidebar-nav-item">
              <a href="developer.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                </svg>
                <span data-i18n="sidebar.dashboard">仪表盘</span>
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="my-plugins.html" class="sidebar-nav-link active">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                <span data-i18n="sidebar.myPlugins">我的插件</span>
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="submit-plugin.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span data-i18n="sidebar.submit">提交插件</span>
              </a>
            </li>
          </ul>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
          <div>
            <h1 class="page-title" data-i18n="myPlugins.title">我的插件</h1>
            <p class="page-description" data-i18n="myPlugins.subtitle">管理您提交的所有插件</p>
          </div>
          <a href="submit-plugin.html" class="btn btn-primary" data-i18n="myPlugins.new">提交新插件</a>
        </div>

        <!-- Plugin List -->
        <div class="card">
          <div class="card-body">
            <div id="plugins-container">
              <!-- Plugins will be loaded here -->
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-grid">
            <div class="footer-section">
              <h3 class="footer-section-title" data-i18n="footer.thanks">特别鸣谢</h3>
              <a href="https://github.com/" target="_blank" class="footer-link" data-i18n="footer.github">GitHub</a>
              <a href="contributors.html" class="footer-link" data-i18n="footer.contributors">开源贡献者</a>
              <a href="#" class="footer-link" data-i18n="footer.community">社区支持者</a>
            </div>
            <div class="footer-section">
              <h3 class="footer-section-title" data-i18n="footer.docs">相关说明</h3>
              <a href="terms.html" class="footer-link" data-i18n="footer.terms">服务条款</a>
              <a href="privacy.html" class="footer-link" data-i18n="footer.privacy">隐私政策</a>
              </div>
          </div>
          <div class="footer-bottom">
            <p data-i18n="site.name">KiraAI 插件商店 - 元数据插件平台</p>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
  <script>
    // 检查登录状态
    if (!auth.isAuthenticated()) {
      window.location.href = '/login.html?returnUrl=' + encodeURIComponent(window.location.pathname);
    }

    // 获取翻译函数
    const t = window.i18n ? window.i18n.t.bind(window.i18n) : (k) => k;

    // 加载插件列表
    async function loadPlugins() {
      const container = document.getElementById('plugins-container');
      
      try {
        utils.showLoading(container, t('msg.loading'));
        
        const data = await api.get('/developer/plugins');
        const plugins = data.items || [];

        if (plugins.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
              </svg>
              <h3 class="empty-title" data-i18n="msg.empty">暂无数据</h3>
              <p class="empty-description" data-i18n="myPlugins.empty">您还没有提交任何插件</p>
              <a href="submit-plugin.html" class="btn btn-primary" data-i18n="myPlugins.emptyAction">立即提交第一个插件</a>
            </div>
          `;
          // 应用翻译到动态生成的内容
          if (window.i18n) {
            window.i18n.applyLanguage();
          }
          return;
        }

        container.innerHTML = `
          <div class="plugin-list">
            ${plugins.map(plugin => `
              <div class="plugin-item" style="display: flex; align-items: start; padding: 1rem; border: 1px solid var(--border-color); border-radius: 0.5rem; margin-bottom: 1rem;">
                <img src="${plugin.github_data?.owner?.avatar_url || 'https://avatars.githubusercontent.com/u/0?v=4'}" alt="${plugin.author}" style="width: 48px; height: 48px; border-radius: 50%; margin-right: 1rem;">
                <div style="flex: 1;">
                  <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem;">
                    <h3 style="margin: 0; font-size: 1.125rem;">${plugin.name}</h3>
                    <span class="badge badge-${getStatusClass(plugin.status)}">${getStatusLabel(plugin.status)}</span>
                  </div>
                  <p style="margin: 0 0 0.5rem 0; color: var(--text-secondary); font-size: 0.875rem;">${plugin.description || t('msg.empty')}</p>
                  <div style="display: flex; align-items: center; gap: 1rem; font-size: 0.75rem; color: var(--text-secondary);">
                    <span>${t('plugin.version')}: v${plugin.version || 'unknown'}</span>
                    <span style="display: flex; align-items: center; gap: 0.25rem;">
                      <svg style="width: 14px; height: 14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
                      </svg>
                      ${plugin.github_data?.stargazers_count || plugin.github_data?.stars || 0}
                    </span>
                    <span style="display: flex; align-items: center; gap: 0.25rem;">
                      <svg style="width: 14px; height: 14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                      </svg>
                      ${plugin.github_data?.forks_count || plugin.github_data?.forks || 0}
                    </span>
                    <span>${t('myPlugins.submittedAt')} ${utils.formatDate(plugin.created_at)}</span>
                  </div>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                  <a href="${plugin.repo_url}" target="_blank" class="btn btn-ghost btn-sm" data-i18n="action.viewRepo">${t('action.viewRepo')}</a>
                  ${plugin.status === 'pending' || plugin.status === 'approved' ? `
                    <button class="btn btn-error btn-sm" onclick="withdrawPlugin(${plugin.id}, '${plugin.name}')" data-i18n="action.withdraw">${t('action.withdraw')}</button>
                  ` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        `;

        // 应用翻译到动态生成的内容
        if (window.i18n) {
          window.i18n.applyLanguage();
        }
      } catch (error) {
        utils.showError(container, t('msg.error.load'), 'loadPlugins()');
      }
    }

    function getStatusClass(status) {
      const classes = {
        'pending': 'warning',
        'approved': 'success',
        'rejected': 'error',
        'removed': 'default'
      };
      return classes[status] || 'default';
    }

    function getStatusLabel(status) {
      const labels = {
        'pending': t('status.pending'),
        'approved': t('status.approved'),
        'rejected': t('status.rejected'),
        'removed': t('status.removed')
      };
      return labels[status] || status;
    }

    // 撤回插件
    async function withdrawPlugin(pluginId, pluginName) {
      if (!confirm(t('myPlugins.withdrawConfirm').replace('{name}', pluginName))) {
        return;
      }

      try {
        await api.post(`/developer/plugins/${pluginId}/withdraw`, {});
        alert(t('myPlugins.withdrawSuccess'));
        loadPlugins(); // 刷新列表
      } catch (error) {
        if (error.message && error.message.includes('400')) {
          alert(t('myPlugins.withdrawError400'));
        } else {
          alert(t('msg.error.action') + error.message);
        }
      }
    }

    loadPlugins();
  </script>
</body>
</html>
