<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title="dev.title">开发者仪表盘 - 开源插件市场</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <a href="/" class="logo" data-i18n="site.name">KiraAI 插件商店</a>
        <nav class="nav-links">
          <a href="store.html" class="nav-link" data-i18n="nav.browse">浏览商店</a>
          <div class="user-container"></div>
          <button class="lang-switch" onclick="i18n.toggleLanguage()" title="Switch Language">
            <span class="lang-current">中/EN</span>
          </button>
        </nav>
      </div>
    </header>

    <!-- Layout with Sidebar -->
    <div class="layout-with-sidebar">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-section-title" data-i18n="nav.developer">开发者中心</div>
          <ul class="sidebar-nav">
            <li class="sidebar-nav-item">
              <a href="developer.html" class="sidebar-nav-link active">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                </svg>
                <span data-i18n="nav.dashboard">仪表盘</span>
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="my-plugins.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                <span data-i18n="nav.myPlugins">我的插件</span>
              </a>
            </li>
            <li class="sidebar-nav-item">
              <a href="submit-plugin.html" class="sidebar-nav-link">
                <svg class="sidebar-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span data-i18n="nav.submit">提交插件</span>
              </a>
            </li>
          </ul>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Page Header -->
        <div class="page-header">
          <h1 class="page-title" data-i18n="dev.title">开发者仪表盘</h1>
          <p class="page-description" id="welcome-text" data-i18n="dev.welcome">欢迎回来！管理您的插件提交。</p>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid" id="stats-container">
          <div class="stat-card">
            <div class="stat-info">
              <p class="stat-label" data-i18n="dev.stats.total">全部插件</p>
              <p class="stat-value" id="stat-total">0</p>
            </div>
            <div class="stat-icon info">
              <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
              </svg>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-info">
              <p class="stat-label" data-i18n="dev.stats.pending">待审核</p>
              <p class="stat-value" id="stat-pending">0</p>
            </div>
            <div class="stat-icon warning">
              <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-info">
              <p class="stat-label" data-i18n="dev.stats.approved">已通过</p>
              <p class="stat-value" id="stat-approved">0</p>
            </div>
            <div class="stat-icon success">
              <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-info">
              <p class="stat-label" data-i18n="dev.stats.rejected">已驳回</p>
              <p class="stat-value" id="stat-rejected">0</p>
            </div>
            <div class="stat-icon error">
              <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="card" style="margin-top: 2rem;">
          <div class="card-body">
            <h3 class="card-title" data-i18n="dev.quickActions">快捷操作</h3>
            <div style="display: flex; flex-wrap: wrap; gap: 1rem;">
              <a href="submit-plugin.html" class="btn btn-primary">
                <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                <span class="action-text" data-i18n="dev.action.submit">提交新插件</span>
              </a>
              <a href="my-plugins.html" class="btn btn-secondary">
                <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                <span class="action-text" data-i18n="dev.action.myPlugins">我的插件</span>
              </a>
              <a href="#" class="btn btn-ghost" onclick="alert('Coming soon!'); return false;">
                <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
                <span class="action-text" data-i18n="dev.action.docs">开发文档</span>
              </a>
            </div>
          </div>
        </div>

        <!-- Recent Submissions -->
        <div class="card" style="margin-top: 2rem;">
          <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h3 class="card-title" data-i18n="dev.recent">最近提交</h3>
            <a href="my-plugins.html" class="btn btn-ghost btn-sm" data-i18n="dev.viewAll">查看全部</a>
          </div>
          <div class="card-body">
            <div id="recent-submissions" data-i18n="msg.loading">加载中...</div>
          </div>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-grid">
            <div class="footer-section">
              <h3 class="footer-section-title" data-i18n="footer.thanks">特别鸣谢</h3>
              <a href="https://github.com/" target="_blank" class="footer-link" data-i18n="footer.github">GitHub</a>
              <a href="contributors.html" class="footer-link" data-i18n="footer.contributors">开源贡献者</a>
              <a href="#" class="footer-link" data-i18n="footer.community">社区支持者</a>
            </div>
            <div class="footer-section">
              <h3 class="footer-section-title" data-i18n="footer.docs">相关说明</h3>
              <a href="terms.html" class="footer-link" data-i18n="footer.terms">使用条款</a>
              <a href="privacy.html" class="footer-link" data-i18n="footer.privacy">隐私政策</a>
              <a href="#" class="footer-link" data-i18n="footer.disclaimer">免责声明</a>
            </div>
            <div class="footer-section">
              <h3 class="footer-section-title" data-i18n="footer.contact">联系我们</h3>
              <a href="mailto:contact@example.com" class="footer-link" data-i18n="footer.email">电子邮箱</a>
              <a href="#" class="footer-link" data-i18n="footer.feedback">问题反馈</a>
              <a href="#" class="footer-link" data-i18n="footer.joinUs">加入我们</a>
            </div>
          </div>
          <div class="footer-bottom">
            <p data-i18n="site.tagline">开源插件市场 - 元数据插件平台</p>
            <p style="margin-top: 0.5rem;">本站不托管插件文件，请直接访问 GitHub 仓库获取</p>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
  <script>
    // Check login status
    if (!auth.isAuthenticated()) {
      window.location.href = '/login.html?returnUrl=' + encodeURIComponent(window.location.pathname);
    }

    // Update welcome text with username
    const user = auth.getUser();
    if (user && window.i18n) {
      document.getElementById('welcome-text').textContent = 
        i18n.t('dev.welcome').replace('！', '，' + user.username + '！');
    }

    // Load stats and recent submissions
    async function loadStats() {
      try {
        const t = window.i18n ? window.i18n.t.bind(window.i18n) : (k) => k;
        const data = await api.get('/developer/plugins');
        const plugins = data.items || [];

        document.getElementById('stat-total').textContent = plugins.length;
        document.getElementById('stat-pending').textContent = plugins.filter(p => p.status === 'pending').length;
        document.getElementById('stat-approved').textContent = plugins.filter(p => p.status === 'approved').length;
        document.getElementById('stat-rejected').textContent = plugins.filter(p => p.status === 'rejected').length;

        // Load recent submissions
        const container = document.getElementById('recent-submissions');
        if (plugins.length === 0) {
          container.innerHTML = `<p class="text-secondary" style="text-align: center; padding: 2rem;">${t('msg.empty.plugins')}</p>`;
          return;
        }

        const recentPlugins = plugins.slice(0, 5);
        container.innerHTML = recentPlugins.map(plugin => {
          const statusConfig = {
            'pending': { icon: 'clock', color: 'warning', text: t('status.pending') },
            'approved': { icon: 'check', color: 'success', text: t('status.approved') },
            'rejected': { icon: 'x', color: 'error', text: t('status.rejected') }
          };
          const config = statusConfig[plugin.status] || statusConfig.pending;
          
          return `
            <div class="plugin-list-item" style="display: flex; align-items: center; padding: 1rem; border-bottom: 1px solid var(--color-border);">
              <div class="plugin-icon" style="width: 40px; height: 40px; border-radius: 8px; background: var(--color-primary); display: flex; align-items: center; justify-content: center; margin-right: 1rem;">
                <svg style="width: 20px; height: 20px; color: white;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
              </div>
              <div class="plugin-info" style="flex: 1;">
                <div class="plugin-name" style="font-weight: 600;">${plugin.name}</div>
                <div class="plugin-meta" style="font-size: 0.875rem; color: var(--color-text-secondary);">
                  ${plugin.status === 'pending' ? t('dev.submitted') : t('dev.reviewed')} ${utils.formatDate(plugin.updatedAt)}
                </div>
              </div>
              <span class="badge badge-${config.color}">${config.text}</span>
            </div>
          `;
        }).join('');
      } catch (error) {
        console.error('Failed to load stats:', error);
        const t = window.i18n ? window.i18n.t.bind(window.i18n) : (k) => k;
        document.getElementById('recent-submissions').innerHTML = 
          `<p class="text-error" style="text-align: center; padding: 2rem;">${t('msg.error.load')}</p>`;
      }
    }

    loadStats();
  </script>
</body>
</html>
