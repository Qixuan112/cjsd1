<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 开源插件市场</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <a href="/" class="logo">开源插件市场</a>
      </div>
    </header>

    <!-- Login Form -->
    <main class="page-content" style="display: flex; align-items: center; justify-content: center; padding: 2rem;">
      <div style="width: 100%; max-width: 400px;">
        <div class="card" style="padding: 2rem;">
          <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">欢迎回来</h1>
            <p style="color: var(--color-text-secondary);">使用 GitHub 账号登录以继续</p>
          </div>

          <!-- Error Message -->
          <div id="error-message" class="alert alert-error" style="display: none; margin-bottom: 1rem;">
            <svg style="width: 20px; height: 20px; flex-shrink: 0;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span id="error-text"></span>
          </div>

          <!-- GitHub Login Button -->
          <button id="github-login" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">
            <svg style="width: 20px; height: 20px;" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            使用 GitHub 登录
          </button>

          <div style="margin-top: 1.5rem; text-align: center;">
            <p style="font-size: 0.875rem; color: var(--color-text-muted);">
              登录即表示您同意我们的服务条款
            </p>
          </div>

          <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--color-border); text-align: center;">
            <p style="font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 0.5rem;">还没有账号？</p>
            <p style="font-size: 0.75rem; color: var(--color-text-muted);">
              首次使用 GitHub 登录将自动创建账号
            </p>
          </div>
        </div>

        <div style="margin-top: 1.5rem; text-align: center;">
          <a href="store.html" style="font-size: 0.875rem; color: var(--color-text-secondary);">← 返回商店</a>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <p>开源插件市场 - 基于 GitHub OAuth 的元数据插件平台</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    // 处理 OAuth 回调
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    const token = urlParams.get('token');
    
    if (error) {
      const errorMessages = {
        'access_denied': '您拒绝了授权请求',
        'invalid_request': '无效的请求参数',
        'invalid_scope': '无效的权限范围',
        'auth_failed': '认证失败，请重试',
        'token_exchange_failed': '无法获取访问令牌',
        'user_fetch_failed': '无法获取用户信息'
      };
      document.getElementById('error-text').textContent = errorMessages[error] || '登录过程中发生错误，请重试';
      document.getElementById('error-message').style.display = 'flex';
    }
    
    if (token) {
      // 存储 token 并获取用户信息
      localStorage.setItem('plugin_marketplace_token', token);
      // 清除 URL 参数
      window.history.replaceState({}, '', window.location.pathname);
      // 跳转到开发者页面
      window.location.href = '/developer.html';
    }
    
    // 检查是否已登录
    if (auth.isAuthenticated()) {
      window.location.href = '/developer.html';
    }
    
    // GitHub 登录按钮
    document.getElementById('github-login').addEventListener('click', () => {
      // 这里应该配置你的 GitHub OAuth Client ID
      const GITHUB_CLIENT_ID = 'Ov23liPO5baNYcHPzTJY';
      const scope = 'read:user user:email';
      const redirectUri = encodeURIComponent(window.location.origin + '/callback.html');
      
      if (!GITHUB_CLIENT_ID) {
        document.getElementById('error-text').textContent = 'GitHub OAuth 未配置，请联系管理员';
        document.getElementById('error-message').style.display = 'flex';
        return;
      }
      
      const githubAuthUrl = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${redirectUri}&scope=${encodeURIComponent(scope)}`;
      window.location.href = githubAuthUrl;
    });
  </script>
</body>
</html>
